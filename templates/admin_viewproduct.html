<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Product</title>
    <link rel="apple-touch-icon" sizes="180x180" href="{{url_for('static', filename='images/apple-touch-icon.png')}}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{url_for('static', filename='images/favicon-32x32.png')}}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{url_for('static', filename='images/favicon-16x16.png')}}">
    <link rel="manifest" href="{{url_for('static', filename='images/site.webmanifest')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {

            background: #eef2f7;

            min-height: 100vh;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 50px;
        }

        .view-card {

            width: 100%;

            max-width: 1400px;

            background: white;

            border-radius: 30px;

            overflow: hidden;

            display: grid;

            grid-template-columns: 45% 55%;

            box-shadow: 0 20px 45px rgba(0, 0, 0, .12);
        }

        .image-side {

            background: #f8fafc;

            display: flex;

            justify-content: center;

            align-items: center;

            padding: 35px;
        }

        .product-image {

            width: 100%;

            max-height: 600px;

            object-fit: contain;

            border-radius: 20px;

            background: white;

            padding: 20px;

            box-shadow: 0 10px 25px rgba(0, 0, 0, .08);
        }

        .details {

            padding: 50px;
        }

        .category {

            display: inline-block;

            background: #dbeafe;

            color: #1d4ed8;

            padding: 8px 18px;

            border-radius: 30px;

            font-size: 14px;

            font-weight: 600;

        }

        .details h1 {

            margin-top: 25px;

            color: #071330;

            font-size: 42px;

            font-weight: 700;
        }

        .price {

            margin-top: 20px;

            color: #f59e0b;

            font-size: 40px;

            font-weight: 700;
        }

        .stock {

            margin-top: 18px;

            display: inline-block;

            padding: 10px 18px;

            border-radius: 30px;

            background: #dcfce7;

            color: #166534;

            font-weight: 600;
        }

        .section {

            margin-top: 35px;
        }

        .section h3 {

            color: #071330;

            margin-bottom: 10px;

            font-size: 22px;
        }

        .section p {

            color: #475569;

            line-height: 1.8;

            font-size: 16px;

            text-align: justify;
        }

        .action-buttons {

            display: flex;

            gap: 18px;

            margin-top: 50px;

            flex-wrap: wrap;
        }

        .action-buttons a {

            flex: 1;

            min-width: 180px;

            height: 55px;

            border-radius: 15px;

            display: flex;

            justify-content: center;

            align-items: center;

            text-decoration: none;

            font-size: 17px;

            font-weight: 600;

            transition: .3s;
        }

        .back-btn {

            background: #071330;

            color: white;
        }

        .back-btn:hover {

            background: #0f235d;
        }

        .edit-btn {

            background: #f59e0b;

            color: white;
        }

        .edit-btn:hover {

            background: #d97706;
        }

        .delete-btn {

            background: #dc2626;

            color: white;
        }

        .delete-btn:hover {

            background: #b91c1c;
        }

        .action-buttons i {

            margin-right: 10px;
        }

        @media(max-width:1000px) {

            .view-card {

                grid-template-columns: 1fr;
            }

            .details {

                padding: 35px;
            }

            .details h1 {

                font-size: 32px;
            }

            .price {

                font-size: 30px;
            }
        }
    </style>
</head>

<body>

    <div class="view-card">

        <div class="image-side">

            <img src="{{ url_for('static', filename='images/' + product[7]) }}" class="product-image">

        </div>

        <div class="details">

            <div class="category">
                {{product[6]}}
            </div>

            <h1>
                {{product[1]}}
            </h1>

            <div class="price">
                ₹{{product[4]}}
            </div>

            <div class="stock">
                Available Stock : {{product[5]}}
            </div>

            <div class="section">

                <h3>Description</h3>

                <p>
                    {{product[2]}}
                </p>

            </div>

            <div class="section">

                <h3>About Product</h3>

                <p>
                    {{product[3]}}
                </p>

            </div>

            <div class="action-buttons">

                <a href="{{url_for('viewallitems')}}" class="back-btn">

                    <i class="fa-solid fa-arrow-left"></i>

                    All Products

                </a>

                <a href="{{url_for('editproduct',itemid=product[0])}}" class="edit-btn">

                    <i class="fa-solid fa-pen"></i>

                    Edit Product

                </a>

                <a href="{{url_for('deleteproduct',itemid=product[0])}}" class="delete-btn"
                    onclick="return confirm('Delete this product?')">

                    <i class="fa-solid fa-trash"></i>

                    Delete Product

                </a>

            </div>

        </div>

    </div>

</body>

</html>
