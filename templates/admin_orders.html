<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order</title>
    <link rel="apple-touch-icon" sizes="180x180" href="{{url_for('static', filename='images/apple-touch-icon.png')}}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{url_for('static', filename='images/favicon-32x32.png')}}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{url_for('static', filename='images/favicon-16x16.png')}}">
    <link rel="manifest" href="{{url_for('static', filename='images/site.webmanifest')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {

            background: #f3f4f6;

            min-height: 100vh;

            overflow-x: hidden;
        }


        /* ================= CONTAINER ================= */

        .dashboard-container {

            display: flex;
        }


        /* ================= SIDEBAR ================= */
        /* ===== SIDEBAR ===== */

        .sidebar {

            width: 260px;

            background: #071330;

            position: fixed;

            top: 0;

            left: 0;

            bottom: 0;

            overflow-y: auto;

            transition: .35s ease;

            z-index: 1000;
        }


        /* Default collapsed */

        .sidebar.collapsed {

            width: 90px;
        }


        /* Toggle button */

        .toggle-btn {

            position: absolute;

            top: 18px;

            right: 20px;

            width: 45px;

            height: 45px;

            border: none;

            border-radius: 50%;

            background: #fbbf24;

            color: #071330;

            cursor: pointer;

            font-size: 18px;

            transition: .3s;
        }


        .toggle-btn:hover {

            transform: rotate(90deg);
        }


        /* Header */

        .sidebar-header {

            display: flex;

            flex-direction: column;

            align-items: center;

            margin-top: 80px;

            margin-bottom: 40px;
        }


        .sidebar-logo {

            width: 95px;

            height: 95px;

            border-radius: 50%;

            object-fit: cover;

            border: 3px solid #fbbf24;
        }


        .sidebar-header h3 {

            color: white;

            margin-top: 15px;

            font-size: 28px;
        }


        .sidebar-header span {

            color: #fbbf24;

            font-size: 14px;
        }


        /* Menu */

        .sidebar-menu {

            display: flex;

            flex-direction: column;

            padding: 20px;

            gap: 12px;
        }


        .sidebar-menu a {

            height: 55px;

            display: flex;

            align-items: center;

            gap: 15px;

            padding: 0 18px;

            border-radius: 14px;

            text-decoration: none;

            color: white;

            font-weight: 600;

            transition: .3s;
        }


        .sidebar-menu a i {

            font-size: 18px;

            min-width: 25px;

            text-align: center;
        }


        .sidebar-menu a:hover {

            background: #fbbf24;

            color: #071330;
        }


        .sidebar-menu a.active {

            background: #fbbf24;

            color: #071330;
        }


        /* Logout */

        .logout-link {

            color: #ef4444 !important;
        }


        .logout-link:hover {

            background: #ef4444 !important;

            color: white !important;
        }


        /* Collapsed Mode */

        .sidebar.collapsed .sidebar-header h3,

        .sidebar.collapsed .sidebar-header span {

            display: none;
        }


        .sidebar.collapsed .sidebar-logo {

            width: 55px;

            height: 55px;
        }


        .sidebar.collapsed .sidebar-menu a {

            justify-content: center;

            padding: 0;
        }


        .sidebar.collapsed .sidebar-menu a span {

            display: none;
        }


        /* Scrollbar */

        .sidebar::-webkit-scrollbar {

            width: 6px;
        }


        .sidebar::-webkit-scrollbar-thumb {

            background: #fbbf24;

            border-radius: 10px;
        }


        /* Responsive */

        /* @media(max-width:768px) {

            .sidebar {

                width: 90px;
            }

        } */

        /* ================= MAIN CONTENT ================= */

        .main-content {

            margin-left: 260px;

            width: calc(100% - 260px);

            min-height: 100vh;

            padding: 40px;

            transition: .35s ease;
        }


        .main-content.expanded {

            margin-left: 90px;

            width: calc(100% - 90px);
        }


        /* ================= TOP BAR ================= */

        .top-bar {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 35px;
        }


        .top-bar h1 {

            font-size: 36px;

            color: #071330;

            font-weight: 700;
        }


        /* ================= TABLE CARD ================= */

        .orders-table {

            background: white;

            border-radius: 20px;

            padding: 25px;

            box-shadow:

                0 10px 30px rgba(0, 0, 0, .08);

            overflow-x: auto;
        }


        /* ================= TABLE ================= */

        table {

            width: 100%;

            border-collapse: collapse;
        }


        thead {

            background: #071330;

            color: white;
        }


        thead th {

            padding: 18px;

            text-align: left;

            font-size: 15px;
        }


        tbody tr {

            border-bottom: 1px solid #e5e7eb;

            transition: .3s;
        }


        tbody tr:hover {

            background: #f9fafb;
        }


        tbody td {

            padding: 18px;

            font-size: 15px;
        }


        /* ================= STATUS ================= */

        .status {

            padding: 8px 14px;

            background: #dcfce7;

            color: #15803d;

            border-radius: 20px;

            font-size: 14px;

            font-weight: 600;
        }


        /* ================= BUTTON ================= */

        tbody a {

            background: #2563eb;

            color: white;

            text-decoration: none;

            padding: 10px 18px;

            border-radius: 10px;

            font-weight: 600;

            transition: .3s;
        }


        tbody a:hover {

            background: #1d4ed8;
        }


        /* ================= SCROLLBAR ================= */

        /* .sidebar::-webkit-scrollbar {

            width: 6px;
        }


        .sidebar::-webkit-scrollbar-thumb {

            background: #fbbf24;

            border-radius: 10px;
        } */


        /* ================= MOBILE ================= */

        @media(max-width:768px) {

            .main-content {

                padding: 20px;
            }

            .top-bar h1 {

                font-size: 28px;
            }

            tbody td,

            thead th {

                font-size: 13px;
            }

        }
    </style>
</head>

<body>
    <div class="dashboard-container">

        <!-- SIDEBAR -->

        <aside class="sidebar collapsed" id="sidebar">

            <button class="toggle-btn" id="toggleBtn">

                <i class="fa-solid fa-bars"></i>

            </button>


            <div class="sidebar-header">

                <img src="/static/images/ShopSphere.jpeg" class="sidebar-logo">

                <h3>ShopSphere</h3>

                <span>Admin Panel</span>

            </div>


            <div class="sidebar-menu">

                <a href="{{url_for('admindashboard')}}">

                    <i class="fa-solid fa-house"></i>

                    <span>Dashboard</span>

                </a>


                <a href="{{url_for('additem')}}">

                    <i class="fa-solid fa-plus"></i>

                    <span>Add Product</span>

                </a>


                <a href="{{url_for('viewallitems')}}">

                    <i class="fa-solid fa-box"></i>

                    <span>Products</span>

                </a>


                <a href="{{url_for('adminorders')}}" class="active">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span>Orders</span>

                </a>


                <a href="{{url_for('admincustomers')}}">

                    <i class="fa-solid fa-users"></i>

                    <span>Customers</span>

                </a>


                <a href="{{url_for('adminlogout')}}">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    <span>Logout</span>

                </a>

            </div>

        </aside>
        <div class="main-content expanded" id="mainContent">

            <div class="top-bar">

                <h1>

                    Orders

                </h1>

            </div>


            <div class="orders-table">

                <table>

                    <thead>

                        <tr>

                            <th>Order ID</th>

                            <th>Customer</th>

                            <th>Total</th>

                            <th>Status</th>

                            <th>Date</th>

                            <th>Actions</th>

                        </tr>

                    </thead>


                    <tbody>

                        {% for o in orders %}

                        <tr>

                            <td>

                                {{o[0]}}

                            </td>

                            <td>

                                {{o[1]}}

                            </td>

                            <td>

                                ₹{{o[2]}}

                            </td>

                            <td>

                                <span class="status">

                                    {{o[3]}}

                                </span>

                            </td>

                            <td>

                                {{o[4]}}

                            </td>

                            <td>

                                <a href="#">

                                    View

                                </a>

                            </td>

                        </tr>

                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>

    </div>
    <script>

        const sidebar = document.getElementById('sidebar')

        const main = document.getElementById('mainContent')

        const btn = document.getElementById('toggleBtn')

        btn.onclick = function () {

            sidebar.classList.toggle('collapsed')

            main.classList.toggle('expanded')

        }

    </script>



</body>

</html>
