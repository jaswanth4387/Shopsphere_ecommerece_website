<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
    <link rel="apple-touch-icon" sizes="180x180" href="static/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="static/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="static/images/favicon-16x16.png">
    <link rel="manifest" href="static/images/site.webmanifest">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        /* ======================================================
                    GLOBAL
====================================================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #f4f7fb;
            color: #071330;
        }

        /* ======================================================
                    CONTAINER
====================================================== */

        .container {
            max-width: 1400px;
        }

        /* ======================================================
                    CARDS
====================================================== */

        .checkout-card,
        .summary-card {

            background: #fff;

            border-radius: 24px;

            padding: 35px;

            box-shadow: 0 15px 40px rgba(0, 0, 0, .08);

            margin-bottom: 30px;

            transition: .3s;
        }

        .checkout-card:hover,
        .summary-card:hover {

            transform: translateY(-3px);

            box-shadow: 0 18px 45px rgba(0, 0, 0, .12);

        }

        /* ======================================================
                    TITLES
====================================================== */

        .section-title {

            font-size: 30px;

            font-weight: 700;

            color: #071330;

            margin-bottom: 30px;

            display: flex;

            align-items: center;

            gap: 12px;
        }

        .section-title i {

            color: #f59e0b;
        }

        /* ======================================================
                    LABELS
====================================================== */

        .form-label {

            font-weight: 600;

            color: #071330;

            margin-bottom: 8px;
        }

        /* ======================================================
                    INPUTS
====================================================== */

        .form-control {

            height: 55px;

            border-radius: 14px;

            border: 1px solid #dbe4ef;

            padding: 0 18px;

            font-size: 16px;

            transition: .3s;
        }

        textarea.form-control {

            min-height: 130px;

            padding-top: 15px;

            resize: none;
        }

        .form-control:focus {

            border-color: #f59e0b;

            box-shadow: 0 0 0 .2rem rgba(245, 158, 11, .15);

        }

        /* ======================================================
                    PRODUCT ROW
====================================================== */

        .product-row {

            display: flex;

            align-items: center;

            justify-content: space-between;

            gap: 20px;

            padding: 22px;

            border-radius: 18px;

            background: #fafafa;

            margin-bottom: 18px;

            transition: .3s;
        }

        .product-row:hover {

            background: #fff7eb;

            transform: translateY(-2px);

        }

        /* ======================================================
                    IMAGE
====================================================== */

        .product-image {

            width: 110px;

            height: 110px;

            flex-shrink: 0;
        }

        .product-image img {

            width: 100%;

            height: 100%;

            object-fit: contain;

            border-radius: 15px;

            background: white;

            padding: 10px;

            border: 1px solid #eee;

        }

        /* ======================================================
                    PRODUCT DETAILS
====================================================== */

        .product-details {

            flex: 1;
        }

        .product-details h5 {

            font-size: 20px;

            font-weight: 700;

            color: #071330;

            margin-bottom: 8px;
        }

        .product-details small {

            color: #64748b;

            font-size: 15px;
        }

        /* ======================================================
                    PRICE
====================================================== */

        .product-price {

            font-size: 24px;

            font-weight: 700;

            color: #16a34a;

            min-width: 130px;

            text-align: right;
        }

        /* ======================================================
                SUMMARY CARD
====================================================== */

        .summary-card {

            position: sticky;

            top: 30px;
        }

        .summary-card h3 {

            font-weight: 700;

            color: #071330;

            margin-bottom: 20px;
        }

        .summary-row {

            display: flex;

            justify-content: space-between;

            margin-bottom: 18px;

            font-size: 17px;
        }

        .summary-row span:last-child {

            font-weight: 600;
        }

        .summary-total {

            display: flex;

            justify-content: space-between;

            align-items: center;

            font-size: 25px;

            font-weight: 700;

            margin-top: 25px;

            color: #071330;
        }

        .summary-total span:last-child {

            color: #16a34a;
        }

        /* ======================================================
                    BUTTONS
====================================================== */

        .btn {

            border-radius: 15px;

            height: 58px;

            font-weight: 600;

            font-size: 17px;

            transition: .3s;
        }

        .btn-warning {

            background: #f59e0b;

            border: none;

            color: #071330;
        }

        .btn-warning:hover {

            background: #d97706;

            color: white;

            transform: translateY(-2px);
        }

        .btn-outline-dark {

            border: 2px solid #071330;

            color: #071330;
        }

        .btn-outline-dark:hover {

            background: #071330;

            color: white;
        }

        /* ======================================================
                    HR
====================================================== */

        hr {

            border: none;

            border-top: 1px solid #e5e7eb;

            margin: 20px 0;
        }

        /* ======================================================
                    ICONS
====================================================== */

        .fa-credit-card {

            margin-right: 8px;
        }

        .fa-arrow-left {

            margin-right: 8px;
        }

        /* ======================================================
                    ANIMATION
====================================================== */

        .checkout-card,
        .summary-card {

            animation: fadeUp .5s ease;
        }

        @keyframes fadeUp {

            from {

                opacity: 0;

                transform: translateY(25px);

            }

            to {

                opacity: 1;

                transform: translateY(0);

            }

        }

        /* ======================================================
                    RESPONSIVE
====================================================== */

        @media(max-width:992px) {

            .summary-card {

                position: relative;

                top: 0;

                margin-top: 30px;

            }

            .product-row {

                flex-direction: column;

                text-align: center;

            }

            .product-price {

                text-align: center;

                margin-top: 15px;

            }

            .product-image {

                width: 140px;

                height: 140px;

            }

        }

        @media(max-width:768px) {

            .checkout-card,
            .summary-card {

                padding: 22px;

            }

            .section-title {

                font-size: 24px;

            }

            .summary-total {

                font-size: 22px;

            }

            .btn {

                height: 54px;

                font-size: 16px;

            }

        }
    </style>


</head>

<body>

    <div class="container py-5">

        <div class="row">

            <!-- LEFT SIDE -->

            <div class="col-lg-8">

                <div class="checkout-card mb-4">

                    <h2 class="section-title">

                        <i class="fa-solid fa-location-dot"></i>

                        Delivery Address

                    </h2>

                    <form id="checkoutForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Full Name

                                </label>

                                <input type="text" class="form-control" name="fullname" required>

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">

                                    Phone Number

                                </label>

                                <input type="tel" class="form-control" name="phone" required>

                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">

                                Address

                            </label>

                            <textarea class="form-control" rows="4" name="address" required></textarea>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-3">

                                <label class="form-label">

                                    City

                                </label>

                                <input type="text" class="form-control" name="city" required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">

                                    State

                                </label>

                                <input type="text" class="form-control" name="state" required>

                            </div>

                            <div class="col-md-4 mb-3">

                                <label class="form-label">

                                    Pincode

                                </label>

                                <input type="text" class="form-control" name="pincode" required>

                            </div>

                        </div>

                    </form>

                </div>

                <div class="checkout-card">

                    <h2 class="section-title">

                        <i class="fa-solid fa-box"></i>

                        Order Items

                    </h2>

                    {% for item in cart_items %}

                    <div class="product-row">

                        <div class="product-image">

                            <img src="{{url_for('static',filename='images/'+item[4])}}">

                        </div>

                        <div class="product-details">

                            <h5>

                                {{item[2]}}

                            </h5>

                            <small>

                                Quantity :
                                {{item[5]}}

                            </small>

                        </div>

                        <div class="product-price">

                            ₹{{item[6]}}

                        </div>

                    </div>

                    {% endfor %}

                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div class="col-lg-4">

                <div class="summary-card sticky-top">

                    <h3>

                        Order Summary

                    </h3>

                    <hr>

                    <div class="summary-row">

                        <span>

                            Items Total

                        </span>

                        <span>

                            ₹{{grand_total}}

                        </span>

                    </div>

                    <div class="summary-row">

                        <span>

                            Delivery

                        </span>

                        <span class="text-success">

                            FREE

                        </span>

                    </div>

                    <div class="summary-row">

                        <span>

                            GST (18%)

                        </span>

                        <span>

                            ₹{{'%.2f'%(grand_total*0.18)}}

                        </span>

                    </div>

                    <hr>

                    <div class="summary-total">

                        <span>

                            Total Amount

                        </span>

                        <span>

                            ₹{{'%.2f'%(grand_total*1.18)}}

                        </span>

                    </div>

                    <button id="pay-btn" class="btn btn-warning w-100 mt-4">

                        <i class="fa-solid fa-credit-card"></i>

                        Pay ₹{{'%.2f'%(grand_total*1.18)}}

                    </button>

                    <a href="{{url_for('cart')}}" class="btn btn-outline-dark w-100 mt-3">

                        <i class="fa-solid fa-arrow-left"></i>

                        Back to Cart

                    </a>

                </div>

            </div>

        </div>

    </div>

    <!-- Razorpay -->

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <script>

        var options = {

            key: "{{razor_key}}",

            amount: "{{razor_order['amount']}}",

            currency: "INR",

            name: "ShopSphere",

            description: "ShopSphere Secure Checkout",

            image: "{{url_for('static',filename='images/ShopSphere.jpeg')}}",

            order_id: "{{razor_order['id']}}",

            theme: {

                color: "#f59e0b"

            },

            handler: function (response) {

                window.location = "/payment-success?"

                    + "payment_id=" + response.razorpay_payment_id

                    + "&order_id=" + response.razorpay_order_id

                    + "&signature=" + response.razorpay_signature;

            }

        };

        var rzp = new Razorpay(options);

        document.getElementById("pay-btn").onclick = function (e) {

            e.preventDefault();

            rzp.open();

        };

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
