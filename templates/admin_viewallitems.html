<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products</title>
    <link rel="apple-touch-icon" sizes="180x180" href="{{url_for('static', filename='images/apple-touch-icon.png')}}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{url_for('static', filename='images/favicon-32x32.png')}}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{url_for('static', filename='images/favicon-16x16.png')}}">
    <link rel="manifest" href="{{url_for('static', filename='images/site.webmanifest')}}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <style>
        body {

            background: #f3f4f6;

            font-family: Poppins, sans-serif;

            overflow-x: hidden;
        }


        .dashboard-container {

            display: flex;
        }


        /* SIDEBAR */

        .sidebar {

            width: 260px;

            background: #071330;

            position: fixed;

            top: 0;

            left: 0;

            bottom: 0;

            transition: .3s;

            overflow-y: auto;
        }


        .sidebar.collapsed {

            width: 90px;
        }


        .sidebar-header {

            text-align: center;

            margin-top: 80px;
        }


        .sidebar-logo {

            width: 90px;

            height: 90px;

            border-radius: 50%;

            border: 3px solid #fbbf24;
        }


        .sidebar-header h3 {

            color: white;
        }


        .sidebar-header span {

            color: #fbbf24;
        }


        .sidebar-menu {

            display: flex;

            flex-direction: column;

            padding: 20px;

            gap: 12px;
        }


        .sidebar-menu a {

            height: 55px;

            display: flex;

            align-items: center;

            gap: 15px;

            padding: 0 20px;

            border-radius: 14px;

            text-decoration: none;

            font-weight: 600;

            color: white;
        }


        .sidebar-menu a:hover,

        .sidebar-menu a.active {

            background: #fbbf24;

            color: #071330;
        }


        .sidebar.collapsed h3,

        .sidebar.collapsed span {

            display: none;
        }


        .sidebar.collapsed .sidebar-menu a {

            justify-content: center;
        }


        .sidebar.collapsed .sidebar-menu a span {

            display: none;
        }


        /* CONTENT */

        .main-content {

            margin-left: 260px;

            width: calc(100% - 260px);

            padding: 40px;

            transition: .3s;
        }


        .main-content.expanded {

            margin-left: 90px;

            width: calc(100% - 90px);
        }


        /* TOP */

        .top-bar {

            display: flex;

            justify-content: space-between;

            align-items: center;

            margin-bottom: 40px;
        }


        /* SEARCH */

        .search-box {

            display: flex;
        }


        .search-box input {

            height: 50px;

            width: 320px;

            padding: 0 20px;

            border: none;

            border-radius: 30px 0 0 30px;
        }


        .search-box button {

            width: 60px;

            border: none;

            background: #fbbf24;

            border-radius: 0 30px 30px 0;
        }


        /* PRODUCTS */

        .product-grid {

            display: grid;

            grid-template-columns:

                repeat(auto-fill, minmax(250px, 1fr));

            gap: 25px;
        }


        .product-card {

            background: white;

            padding: 20px;

            border-radius: 20px;

            box-shadow:

                0 5px 20px rgba(0, 0, 0, .08);
        }


        .product-card img {

            width: 100%;

            height: 220px;

            object-fit: cover;

            border-radius: 14px;
        }


        .product-card h3 {

            margin-top: 15px;
        }


        .product-card p {

            font-size: 22px;

            font-weight: 700;

            color: #f59e0b;
        }


        /* BUTTONS */

        .actions {

            display: flex;

            gap: 10px;

            margin-top: 20px;
        }


        .actions a {

            flex: 1;

            height: 42px;

            display: flex;

            justify-content: center;

            align-items: center;

            text-decoration: none;

            border-radius: 10px;

            font-weight: 600;
        }


        .view-btn {

            background: #2563eb;

            color: white;
        }


        .edit-btn {

            background: #f59e0b;

            color: white;
        }


        .delete-btn {

            background: #dc2626;

            color: white;
        }

        .toggle-btn {

            position: absolute;

            top: 25px;

            right: 20px;

            width: 42px;

            height: 42px;

            border: none;

            border-radius: 50%;

            background: #fbbf24;

            font-size: 20px;

            cursor: pointer;

            transition: .3s;
        }

        .toggle-btn:hover {

            transform: rotate(90deg);
        }

        .category-badge {

            display: inline-block;

            margin-top: 15px;

            padding: 8px 14px;

            background: #e0f2fe;

            color: #0369a1;

            border-radius: 20px;

            font-size: 13px;

            font-weight: 600;
        }


        .price {

            font-size: 22px;

            font-weight: 700;

            color: #f59e0b;

            margin-top: 10px;
        }

        .top-bar {

            display: flex;

            justify-content: space-between;

            align-items: center;

            flex-wrap: wrap;

            gap: 20px;

            margin-bottom: 40px;
        }


        .top-bar h1 {

            font-size: 36px;

            color: #071330;
        }


        .top-bar p {

            color: #64748b;
        }


        .top-actions {

            display: flex;

            gap: 20px;

            align-items: center;
        }


        .search-box {

            display: flex;
        }


        .search-box input {

            width: 300px;

            height: 50px;

            border: none;

            padding: 0 20px;

            border-radius: 30px 0 0 30px;

            outline: none;

            box-shadow: 0 4px 15px rgba(0, 0, 0, .08);
        }


        .search-box button {

            width: 60px;

            border: none;

            background: #fbbf24;

            border-radius: 0 30px 30px 0;
        }


        .add-btn {

            height: 50px;

            padding: 0 25px;

            display: flex;

            align-items: center;

            gap: 10px;

            background: #071330;

            color: white;

            text-decoration: none;

            border-radius: 30px;

            font-weight: 600;
        }


        .product-grid {

            display: grid;

            grid-template-columns:

                repeat(auto-fill, minmax(280px, 1fr));

            gap: 30px;
        }


        .product-card {

            background: white;

            border-radius: 25px;

            overflow: hidden;

            padding: 20px;

            box-shadow:

                0 8px 25px rgba(0, 0, 0, .08);

            transition: .3s;
        }


        .product-card:hover {

            transform: translateY(-8px);
        }


        .product-card img {

            width: 100%;

            height: 220px;

            object-fit: cover;

            border-radius: 18px;
        }


        .category-badge {

            display: inline-block;

            margin-top: 18px;

            padding: 8px 14px;

            background: #e0f2fe;

            color: #0369a1;

            border-radius: 30px;

            font-size: 13px;

            font-weight: 600;
        }


        .product-card h3 {

            margin-top: 18px;

            font-size: 22px;

            color: #071330;
        }


        .stock {

            margin-top: 10px;

            color: #64748b;
        }


        .price {

            margin-top: 15px;

            font-size: 28px;

            color: #f59e0b;

            font-weight: 700;
        }


        .actions {

            display: flex;

            gap: 12px;

            margin-top: 25px;
        }


        .actions a {

            flex: 1;

            height: 45px;

            display: flex;

            justify-content: center;

            align-items: center;

            border-radius: 12px;

            text-decoration: none;

            color: white;
        }


        .view-btn {

            background: #2563eb;
        }


        .edit-btn {

            background: #f59e0b;
        }


        .delete-btn {

            background: #dc2626;
        }


        @media(max-width:768px) {

            .top-bar {

                flex-direction: column;

                align-items: flex-start;
            }

            .top-actions {

                width: 100%;

                flex-direction: column;
            }

            .search-box {

                width: 100%;
            }

            .search-box input {

                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="dashboard-container">

        <!-- SIDEBAR -->

        <aside class="sidebar collapsed" id="sidebar">

            <button class="toggle-btn" id="toggleBtn">

                ☰

            </button>


            <div class="sidebar-header">

                <img src="/static/images/ShopSphere.jpeg" class="sidebar-logo">

                <h3>ShopSphere</h3>

                <span>Admin Panel</span>

            </div>


            <div class="sidebar-menu">

                <a href="{{url_for('admindashboard')}}">

                    <i class="fa-solid fa-house"></i>

                    <span>Dashboard</span>

                </a>


                <a href="{{url_for('additem')}}">

                    <i class="fa-solid fa-plus"></i>

                    <span>Add Product</span>

                </a>


                <a href="{{url_for('viewallitems')}}" class="active">

                    <i class="fa-solid fa-box"></i>

                    <span>Products</span>

                </a>


                <a href="{{url_for('adminorders')}}">

                    <i class="fa-solid fa-cart-shopping"></i>

                    <span>Orders</span>

                </a>


                <a href="{{url_for('admincustomers')}}">

                    <i class="fa-solid fa-users"></i>

                    <span>Customers</span>

                </a>


                <a href="{{url_for('adminlogout')}}">

                    <i class="fa-solid fa-right-from-bracket"></i>

                    <span>Logout</span>

                </a>

            </div>

        </aside>



        <div class="main-content expanded" id="mainContent">

            <div class="top-bar">

                <div>

                    <h1>Products</h1>

                    <p>Manage your store inventory</p>

                </div>


                <div class="top-actions">

                    <form>

                        <div class="search-box">

                            <input type="search" name="search" value="{{search}}" placeholder="Search products">

                            <button>

                                <i class="fa-solid fa-magnifying-glass"></i>

                            </button>

                        </div>

                    </form>


                    <a href="{{url_for('additem')}}" class="add-btn">

                        <i class="fa-solid fa-plus"></i>

                        Add Product

                    </a>

                </div>

            </div>


            <div class="product-grid">

                {% for i in products %}

                <div class="product-card">

                    <img src="/static/images/{{i[7]}}">


                    <div class="category-badge">

                        {{i[6]}}

                    </div>


                    <h3>

                        {{i[1]}}

                    </h3>


                    <div class="stock">

                        Stock : {{i[5]}}

                    </div>


                    <div class="price">

                        ₹{{i[4]}}

                    </div>


                    <div class="actions">

                       
                        
                        <a href="{{ url_for('viewproduct', itemid=i[0]) }}" class="view-btn">
                            View
                        </a>

                        <a href="{{ url_for('editproduct', itemid=i[0]) }}" class="edit-btn">
                            Edit
                        </a>

                        <a href="{{ url_for('deleteproduct', itemid=i[0]) }}" class="delete-btn">
                            Delete
                        </a>

                    </div>

                </div>

                {% endfor %}

            </div>
        </div>
    </div>


    <script>

        const sidebar = document.getElementById('sidebar')

        const main = document.getElementById('mainContent')

        const btn = document.getElementById('toggleBtn')

        btn.addEventListener('click', () => {

            sidebar.classList.toggle('collapsed')

            main.classList.toggle('expanded')

        })

    </script>

</body>

</html>
